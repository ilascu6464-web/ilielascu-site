<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1" name="viewport">
<title>FlyDBX</title>
<style>
:root {
  color-scheme: dark;
  --bg: #0b0c0b;
  --surface: #151511;
  --surface-raised: #1d1c17;
  --line: rgba(200, 159, 85, 0.34);
  --line-strong: rgba(200, 159, 85, 0.72);
  --gold: #c89f55;
  --gold-light: #ead09a;
  --text: #eee5d3;
  --muted: #a89b84;
  --error: #ff8d86;
  --success: #9fd39a;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 600px;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button,
input,
select {
  font: inherit;
}

.app-header {
  min-height: 76px;
  padding: 18px 28px 14px;
  border-bottom: 1px solid var(--line);
  -webkit-app-region: drag;
}

.app-header h1 {
  margin: 0;
  color: var(--gold-light);
  font-family: Georgia, serif;
  font-size: 25px;
  font-weight: 500;
  letter-spacing: 0;
}

.site-path {
  margin-top: 4px;
  overflow: hidden;
  color: var(--muted);
  font-size: 11px;
  text-overflow: ellipsis;
  white-space: nowrap;
}

main {
  width: min(100%, 720px);
  margin: 0 auto;
  padding: 24px 28px 30px;
}

.top-grid {
  display: grid;
  grid-template-columns: 180px minmax(0, 1fr);
  gap: 22px;
  align-items: start;
}

.cover-zone {
  width: 180px;
  aspect-ratio: 1;
  border: 1px dashed var(--line-strong);
  border-radius: 6px;
  background: var(--surface);
  cursor: pointer;
  display: grid;
  overflow: hidden;
  place-items: center;
  position: relative;
}

.cover-zone:focus-visible,
.cover-zone.is-dragging {
  outline: 2px solid var(--gold);
  outline-offset: 3px;
}

.cover-zone img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cover-placeholder {
  padding: 20px;
  color: var(--muted);
  text-align: center;
}

.cover-placeholder strong {
  display: block;
  margin-bottom: 5px;
  color: var(--gold-light);
  font-weight: 600;
}

.fields {
  display: grid;
  gap: 14px;
}

.field {
  min-width: 0;
}

.field label,
.group-label {
  display: block;
  margin-bottom: 6px;
  color: var(--gold-light);
  font-size: 11px;
  font-weight: 650;
  text-transform: uppercase;
}

input[type="text"],
select {
  width: 100%;
  height: 40px;
  border: 1px solid rgba(255, 255, 255, 0.11);
  border-radius: 5px;
  outline: 0;
  background: var(--surface-raised);
  color: var(--text);
  padding: 0 11px;
}

input[type="text"]:focus,
select:focus {
  border-color: var(--line-strong);
  box-shadow: 0 0 0 2px rgba(200, 159, 85, 0.12);
}

.section {
  margin-top: 22px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
}

.section-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.toggle-row {
  min-height: 40px;
  display: flex;
  align-items: center;
  gap: 9px;
}

.toggle-row input {
  width: 17px;
  height: 17px;
  accent-color: var(--gold);
}

.toggle-row label {
  color: var(--text);
  cursor: pointer;
  font-weight: 550;
}

[hidden] {
  display: none !important;
}

.publish {
  width: 100%;
  height: 46px;
  margin-top: 22px;
  border: 1px solid var(--gold);
  border-radius: 5px;
  background: var(--gold);
  color: #17130d;
  cursor: pointer;
  font-weight: 750;
}

.publish:hover {
  background: var(--gold-light);
}

.publish:disabled {
  cursor: wait;
  opacity: 0.55;
}

.status {
  min-height: 44px;
  margin-top: 12px;
  padding: 11px 12px;
  border: 1px solid transparent;
  border-radius: 5px;
  color: var(--muted);
  text-align: center;
}

.status.is-success {
  border-color: rgba(159, 211, 154, 0.35);
  background: rgba(159, 211, 154, 0.08);
  color: var(--success);
}

.status.is-error {
  border-color: rgba(255, 141, 134, 0.35);
  background: rgba(255, 141, 134, 0.08);
  color: var(--error);
}

@media (max-width: 660px) {
  body {
    min-width: 0;
  }

  .top-grid,
  .section-grid {
    grid-template-columns: 1fr;
  }

  .cover-zone {
    margin: 0 auto;
  }
}
</style>
</head>
<body>
<header class="app-header">
  <h1>FlyDBX</h1>
  <div class="site-path" id="sitePath">Se verifică folderul site-ului...</div>
</header>

<main>
  <div class="top-grid">
    <div class="cover-zone" id="coverZone" role="button" tabindex="0" aria-label="Alege coperta">
      <div class="cover-placeholder" id="coverPlaceholder">
        <strong>Copertă</strong>
        Click sau drag &amp; drop
      </div>
      <img id="coverPreview" alt="Previzualizare copertă" hidden>
    </div>

    <div class="fields">
      <div class="field">
        <label for="title">Titlul piesei</label>
        <input id="title" type="text" autocomplete="off">
      </div>

      <div class="field">
        <label for="album">Album</label>
        <select id="album"></select>
      </div>

      <div class="fields" id="albumNewFields" hidden>
        <div class="field">
          <label for="albumName">Numele albumului nou</label>
          <input id="albumName" type="text" autocomplete="off">
        </div>
        <div class="field">
          <label for="albumYoutube">YouTube playlist album</label>
          <input id="albumYoutube" type="text" inputmode="url" autocomplete="off">
        </div>
      </div>
    </div>
  </div>

  <section class="section" aria-labelledby="recentLabel">
    <span class="group-label" id="recentLabel">Publicare</span>
    <div class="toggle-row">
      <input id="includeRecent" type="checkbox" checked>
      <label for="includeRecent">Include în Ultimele lansări</label>
    </div>

    <div class="section-grid" id="recentFields">
      <div class="field">
        <label for="youtubeUrl">YouTube direct piesă</label>
        <input id="youtubeUrl" type="text" inputmode="url" autocomplete="off">
      </div>
      <div class="field">
        <label for="tiktokUrl">TikTok direct, dacă există</label>
        <input id="tiktokUrl" type="text" inputmode="url" autocomplete="off">
      </div>
    </div>
  </section>

  <button class="publish" id="publish" type="button">Publică</button>
  <div class="status" id="status" role="status" aria-live="polite"></div>
</main>

<script src="renderer.js"></script>
</body>
</html>
