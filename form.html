<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<title>FlyDBX</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, Inter, sans-serif;
  background: #0c0f14;
  color: #ece6dd;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.titlebar {
  height: 38px;
  background: #1a1d29;
  -webkit-app-region: drag;
  display: flex;
  align-items: center;
  padding-left: 80px;
  font-size: 13px;
  font-weight: 600;
  color: #c9a45a;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.cover-zone {
  width: 300px;
  height: 300px;
  margin: 0 auto;
  border: 2px dashed rgba(201,164,90,0.4);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(201,164,90,0.04);
  position: relative;
  overflow: hidden;
}
.cover-zone:hover { border-color: #c9a45a; background: rgba(201,164,90,0.08); }
.cover-zone img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.cover-zone .overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s; color: white; font-size: 13px;
}
.cover-zone:hover .overlay { opacity: 1; }
.cover-zone .placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.cover-icon { font-size: 36px; opacity: 0.5; }
.cover-hint { font-size: 12px; color: #8c857b; }
label { font-size: 12px; font-weight: 600; color: #c9a45a; letter-spacing: 0.06em; text-transform: uppercase; }
input[type=text], select {
  width: 100%; background: #1a1d29; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: #ece6dd; font-size: 14px; padding: 10px 14px;
  outline: none; transition: border-color 0.2s; margin-top: 6px; font-family: inherit;
}
input[type=text]:focus, select:focus { border-color: #c9a45a; }
select { cursor: pointer; } option { background: #1a1d29; }
.field { display: flex; flex-direction: column; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.album-new { display: none; flex-direction: column; gap: 10px; margin-top: 4px; }
.album-new.visible { display: flex; }
.fly-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #c9a45a, #e5c06f);
  border: none; border-radius: 10px; color: #0c0f14;
  font-size: 16px; font-weight: 800; letter-spacing: 0.1em;
  cursor: pointer; transition: all 0.3s; margin-top: 4px;
}
.fly-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,164,90,0.4); }
.fly-btn:active { transform: scale(0.98); }
.fly-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.status { text-align: center; font-size: 13px; min-height: 20px; padding: 8px; border-radius: 8px; transition: all 0.3s; }
.status.ok  { color: #4cd964; background: rgba(76,217,100,0.1); }
.status.err { color: #ff3b30; background: rgba(255,59,48,0.1); }
.drag-over { border-color: #c9a45a !important; background: rgba(201,164,90,0.15) !important; }
</style>
</head>
<body>
<div class="titlebar">✈️ FlyDBX — Publică o piesă nouă</div>
<div class="content">

  <div class="cover-zone" id="coverZone">
    <div class="placeholder" id="coverPlaceholder">
      <div class="cover-icon">🎵</div>
      <div class="cover-hint">Drag & drop cover sau click</div>
    </div>
    <img id="coverPreview" src="" style="display:none">
    <div class="overlay">Schimbă cover</div>
  </div>

  <div class="field">
    <label>Titlul piesei</label>
    <input type="text" id="title" placeholder="ex: SHELBY BLOOD - ROMANI KHER">
  </div>

  <div class="field">
    <label>Album</label>
    <select id="albumSelect">
      <option value="">-- Alege album existent --</option>
      <option value="__new__">+ Album nou</option>
    </select>
  </div>

  <div class="album-new" id="albumNew">
    <div class="field">
      <label>Nume album nou</label>
      <input type="text" id="albumName" placeholder="ex: New Singles 2026">
    </div>
  </div>

  <div class="row2">
    <div class="field">
      <label>YouTube Music link (opțional)</label>
      <input type="text" id="ytlink" placeholder="https://youtube.com/...">
    </div>
    <div class="field">
      <label>Rumble link (opțional)</label>
      <input type="text" id="rumblelink" placeholder="https://rumble.com/...">
    </div>
  </div>

  <div class="field">
    <label>TikTok link (opțional)</label>
    <input type="text" id="tiktok" placeholder="https://www.tiktok.com/@ilascu99/video/...">
  </div>

  <button class="fly-btn" id="flyBtn">✈️ FLY</button>
  <div class="status" id="status"></div>

</div>
<script src="renderer.js"></script>
</body>
</html>
